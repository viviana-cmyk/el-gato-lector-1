name: Actualizar noticias y publicar sitio

on:
  # El horario diario lo maneja cron-job.org (5:00 AM Colombia / 10:00 UTC)
  # via workflow_dispatch. El schedule interno de GitHub se eliminó porque
  # puede atrasarse horas y generar ejecuciones duplicadas.
  # Permite publicar manualmente desde la pestaña "Actions" de GitHub.
  workflow_dispatch:
  # Publica el sitio cuando se hacen cambios de código (sin re-buscar noticias).
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

# Evita que se solapen varios despliegues a GitHub Pages.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    name: Actualizar noticias e indicadores
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Obtener noticias e indicadores
        run: node scripts/fetch-news.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generar análisis con IA
        run: node scripts/generate-analysis.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Confirmar y publicar cambios en los datos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news-colombia.json src/data/news-mundo.json src/data/news-recomendados.json src/data/indicators.json src/data/featured.json src/data/weather.json src/data/analisis.json src/data/podcasts.json src/data/trends.json src/data/dailyinfo.json
          if git diff --cached --quiet; then
            echo "Sin cambios en los datos de hoy."
          else
            git commit -m "chore: actualizar noticias e indicadores ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push || (git pull --rebase && git push)
          fi

  build-and-deploy:
    name: Compilar y publicar en GitHub Pages
    needs: [update-data]
    if: always() && (needs.update-data.result == 'success' || needs.update-data.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          # Toma la última confirmación de la rama, incluyendo el commit de
          # datos que pudo haber creado el job "update-data".
          ref: ${{ github.ref_name }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Compilar sitio
        run: npm run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
