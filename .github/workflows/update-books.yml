name: Actualizar libros recomendados (mensual)

on:
  # El 1° de cada mes a las 10:00 UTC (5:00 AM Colombia)
  schedule:
    - cron: '0 10 1 * *'
  # Permite ejecutar manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-books:
    name: Generar recomendaciones de libros con IA
    runs-on: ubuntu-latest
    outputs:
      hay_cambios: ${{ steps.commit.outputs.hay_cambios }}
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar libros del mes con IA
        run: node scripts/update-books.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Confirmar y publicar cambios
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/curated.json
          if git diff --cached --quiet; then
            echo "Sin cambios en los libros."
            echo "hay_cambios=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: actualizar libros recomendados ($(date -u +'%Y-%m'))"
            git push
            echo "hay_cambios=true" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    name: Compilar y publicar en GitHub Pages
    needs: [update-books]
    if: always() && needs.update-books.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Configurar GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Compilar sitio
        run: npm run build
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
